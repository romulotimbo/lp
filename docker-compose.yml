services:
  landing-api:
    image: ghcr.io/romulotimbo/lp-api:${LP_IMAGE_TAG:-latest}
    container_name: landing-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "3001"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: romulo_db_user
      POSTGRES_DB: personal_db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - creator-internal
      - landing-internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  landing:
    image: ghcr.io/romulotimbo/lp:${LP_IMAGE_TAG:-latest}
    container_name: landing
    restart: unless-stopped
    depends_on:
      landing-api:
        condition: service_healthy
    networks:
      - traefik-proxy
      - landing-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-proxy"
      - "traefik.http.routers.landing.rule=Host(`lp.romulohub.cloud`) || Host(`creatorengine.dpdns.org`) || Host(`www.creatorengine.dpdns.org`)"
      - "traefik.http.routers.landing.entrypoints=websecure"
      - "traefik.http.routers.landing.tls.certresolver=letsencrypt"
      - "traefik.http.services.landing.loadbalancer.server.port=80"

networks:
  traefik-proxy:
    external: true
    name: traefik-proxy
  creator-internal:
    external: true
    name: creator-internal
  landing-internal:
    name: landing-internal
